<div class="min-h-[85vh] flex items-center justify-center px-4">
  <form [formGroup]="form" (ngSubmit)="onSubmit()"
        class="max-w-md w-full bg-white p-10 rounded-3xl shadow-xl border border-brand-pink transition-all duration-500">

    <div class="text-center mb-10">
      <h1 class="font-beauty italic text-4xl text-slate-800">Welcome back</h1>
      <p class="text-slate-500 mt-2 font-light">Sign in to book your next session</p>
    </div>

    <div class="space-y-2 mb-6 text-center" *ngIf="invalidCredentials">
      <small class="block text-red-500 font-medium bg-red-50 p-2 rounded-lg">
        Invalid email or password!
      </small>
    </div>

    <div class="space-y-5">
      <div class="flex flex-col gap-1">
        <input type="email" formControlName="email" placeholder="Email" autocomplete="username"
               [ngClass]="form.get('email')?.touched && form.get('email')?.invalid ? 'border-red-400 focus:border-red-400' : 'border-slate-200 focus:border-brand-gold'"
               class="w-full px-5 py-3 rounded-xl border focus:ring-1 focus:ring-brand-gold outline-none transition-all placeholder:text-slate-400 shadow-sm" />
        <small class="text-red-400 text-xs italic ml-2" *ngIf="form.get('email')?.touched && form.get('email')?.invalid">
          Please enter a valid email address.
        </small>
      </div>

      <div class="flex flex-col gap-1">
        <div class="relative flex items-center">
          <input [type]="showPasswordValue ? 'text' : 'password'" 
                 formControlName="password" 
                 placeholder="Password" 
                 autocomplete="current-password"
                 [ngClass]="form.get('password')?.touched && form.get('password')?.invalid ? 'border-red-400 focus:border-red-400' : 'border-slate-200 focus:border-brand-gold'"
                 class="w-full px-5 py-3 pr-12 rounded-xl border focus:ring-1 focus:ring-brand-gold outline-none transition-all placeholder:text-slate-400 shadow-sm" />
          
          <button type="button" 
                  (click)="togglePasswordVisibility()" 
                  class="absolute right-4 text-slate-400 hover:text-slate-600 transition-colors focus:outline-none select-none"
                  aria-label="Toggle password visibility">
            
            <svg *ngIf="showPasswordValue" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>

            <svg *ngIf="!showPasswordValue" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
            </svg>
          </button>
        </div>
        <small class="text-red-400 text-xs italic ml-2" *ngIf="form.get('password')?.touched && form.get('password')?.invalid">
          Password input is required.
        </small>
      </div>
    </div>

    <div class="text-right mt-3">
      <a routerLink="/forgot-password" class="text-sm text-slate-400 hover:text-brand-gold transition-colors">Forgot password?</a>
    </div>

    <button type="submit" [disabled]="form.invalid || isLoading"
            class="w-full mt-10 bg-slate-900 text-white py-4 rounded-xl font-semibold tracking-widest uppercase text-xs
                   hover:bg-brand-gold hover:text-slate-900 disabled:bg-slate-100 disabled:text-slate-300
                   disabled:cursor-not-allowed transition-all duration-300 shadow-lg flex items-center justify-center">
      <span *ngIf="!isLoading">Enter Studio</span>
      <div *ngIf="isLoading" class="flex items-center gap-2">
        <svg class="animate-spin h-4 w-4 text-white" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span>Processing...</span>
      </div>
    </button>

    <p class="mt-8 text-center text-slate-500 text-sm">
      New here?
      <a routerLink="/signup" class="text-brand-gold font-semibold underline decoration-brand-pink underline-offset-4 hover:text-slate-900 transition-colors">
        Get started here
      </a>
    </p>
  </form>
</div>
